<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="assets/images/favicon.png">
</head>

<body>
    <div class="chat-container">
        <h1>Chat IA</h1>
        <img id="reset-chat-button" class="reset-button" src="assets/images/new.png" alt="Nouvelle conversation">
        <div id="chat-messages" class="chat-messages"></div>

        <div id="loading-indicator" class="loading-indicator" style="display: none;">
            En attente de réponse...
        </div>

        <form id="chat-form" class="chat-form">
            <input type="text" id="user-input" placeholder="Posez votre question..." autocomplete="off">
            
            <button class="bouton" type="submit">
                <img src="assets/images/send.png" class="bouton" type="submit">
            </button>
        </form>
    </div>

    <script src="javascript/api.js" type="module"></script>
</body>

</html>
