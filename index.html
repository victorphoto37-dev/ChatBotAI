<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" href="assets/images/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="javascript/api.js"></script>
</head>

<body>
    <div class="nav-bar">
        <h1 class="title">Chat IA</h1>
        <img
            id="reset-chat-button"
            class="reset-button"
            src="assets/images/new.png"
            alt="Nouvelle conversation"
            title="Nouvelle conversation">

    </div>

    <div class="chat-container">
        
        

        

        <div id="chat-messages" class="chat-messages"></div>

        <div id="loading-indicator" class="loading-indicator" style="display: none;">
            <img src="assets/images/load.gif" alt="Chargement...">
            Chat réfléchit…
        </div>
    </div>

    <form id="chat-form">
        <input
            type="text"
            id="user-input"
            placeholder="Posez votre question…"
            autocomplete="off"
            aria-label="Message"
        >
        <button class="bouton" type="submit" aria-label="Envoyer">
            <img src="assets/images/send.png" alt="Envoyer">
        </button>
        
    </form>
    <p class="warn">Chat IA peut faire des erreurs et ne pas toujours être précis. Merci de vérifier les informations importantes.</p>

    <script src="javascript/api.js" type="module"></script>
</body>

</html>
